services:
  agent:
    build: ./cohost-agent
    ports:
      - "8000:8000"
    env_file:
      - ./cohost-agent/.env
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: node:20-alpine
    working_dir: /app
    # Source is mounted live — no rebuild needed when code changes
    volumes:
      - ./cohost-frontend:/app
      # Separate named volume for node_modules so Linux container binaries
      # don't clash with any Mac-native packages installed on the host
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - AGENT_URL=http://agent:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      agent:
        condition: service_healthy

volumes:
  frontend_node_modules:
