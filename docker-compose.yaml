services:
  agent:
    build: ./cohost-agent
    ports:
      - "8000:8000"
    env_file:
      - ./cohost-agent/.env
    # Mounts your local gcloud Application Default Credentials so the agent
    # can authenticate with Vertex AI without a service account key file.
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./cohost-frontend
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy
    environment:
      - AGENT_URL=http://agent:8000
